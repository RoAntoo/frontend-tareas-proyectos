

<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">Editar Tarea</h4>
        </div>
        <div class="card-body">

          <div *ngIf="isLoading()" class="text-center my-4">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-2 text-muted">Cargando datos de la tarea...</p>
          </div>

          <div *ngIf="errorMessage()" class="alert alert-danger" role="alert">
            {{ errorMessage() }}
          </div>

          <form *ngIf="!isLoading() && task()" [formGroup]="form" (ngSubmit)="onSubmit()">

            <div class="mb-3">
              <label class="form-label fw-bold">Título de la Tarea</label>
              <input type="text" class="form-control" formControlName="title" placeholder="Ej: Actualizar base de datos" />
              <div class="text-danger small mt-1" *ngIf="form.get('title')?.touched && form.get('title')?.invalid">
                El título es obligatorio y no puede estar compuesto solo por espacios.
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Horas Estimadas</label>
                <input type="number" class="form-control" formControlName="estimateHours" min="1" />
                <div class="text-danger small mt-1" *ngIf="form.get('estimateHours')?.touched && form.get('estimateHours')?.invalid">
                  Requerido. Debe ser un número mayor o igual a 1.
                </div>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Asignado a (Opcional)</label>
                <input type="text" class="form-control" formControlName="assignee" placeholder="Ej: jperez" />
              </div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
              <button type="button" class="btn btn-outline-secondary" [routerLink]="['/projects', projectId]">Cancelar</button>

              <button type="submit" class="btn btn-primary" [disabled]="form.invalid || isSaving()">
                <span *ngIf="isSaving()" class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
                Guardar Cambios
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay">
  <div class="custom-modal-card">
    <div class="custom-modal-header">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <h3>{{ title() }}</h3>
    </div>
    <div class="custom-modal-body">
      <p>{{ message() }}</p>
      @if (warningText()) {
        <div class="custom-modal-warning-desc">
          <i class="bi bi-info-circle-fill"></i>
          <span>{{ warningText() }}</span>
        </div>
      }
    </div>
    <div class="custom-modal-actions">
      <button class="btn-modal-cancel" [disabled]="isLoading()" (click)="onCancel()">
        {{ cancelText() }}
      </button>
      <button class="btn-modal-confirm" [disabled]="isLoading()" (click)="onConfirm()">
        @if (isLoading()) {
          <span class="spinner-mini"></span> {{ confirmLoadingText() }}
        } @else {
          {{ confirmText() }}
        }
      </button>
    </div>
  </div>
</div>
